name: Auto Version and Changelog

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  versioning:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Get latest tag
        id: latest_tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Get commits since latest tag
        id: commits
        run: |
          latest_tag="${{ steps.latest_tag.outputs.latest_tag }}"

          if git rev-parse "$latest_tag" >/dev/null 2>&1; then
            commits=$(git log "$latest_tag"..HEAD --pretty=format:"%s")
          else
            commits=$(git log --pretty=format:"%s")
          fi

          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$commits" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Calculate next version
        id: version
        run: |
          latest_tag="${{ steps.latest_tag.outputs.latest_tag }}"
          version=${latest_tag#v}

          IFS='.' read -r major minor patch <<< "$version"

          commits="${{ steps.commits.outputs.commits }}"

          breaking_count=0
          feat_count=0
          fix_count=0

          while IFS= read -r commit; do
            if [[ "$commit" == BREAKINGCHANGE* || "$commit" == "BREAKING CHANGE"* || "$commit" == *"BREAKING CHANGE"* ]]; then
              breaking_count=$((breaking_count + 1))
            elif [[ "$commit" == feat* ]]; then
              feat_count=$((feat_count + 1))
            elif [[ "$commit" == fix* ]]; then
              fix_count=$((fix_count + 1))
            fi
          done <<< "$commits"

          major=$((major + breaking_count))
          minor=$((minor + feat_count))
          patch=$((patch + fix_count))

          new_version="$major.$minor.$patch"
          new_tag="v$new_version"

          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "breaking_count=$breaking_count" >> $GITHUB_OUTPUT
          echo "feat_count=$feat_count" >> $GITHUB_OUTPUT
          echo "fix_count=$fix_count" >> $GITHUB_OUTPUT

      - name: Stop if no version change
        if: steps.version.outputs.new_tag == steps.latest_tag.outputs.latest_tag
        run: |
          echo "No feat, fix, or BREAKING CHANGE commits found. No version update needed."
          exit 0

      - name: Update changelog
        run: |
          new_version="${{ steps.version.outputs.new_version }}"
          new_tag="${{ steps.version.outputs.new_tag }}"
          latest_tag="${{ steps.latest_tag.outputs.latest_tag }}"
          date=$(date +%Y-%m-%d)

          commits="${{ steps.commits.outputs.commits }}"

          temp_file=$(mktemp)

          {
            echo "# Changelog"
            echo ""
            echo "## [$new_version] - $date"
            echo ""

            echo "### Commits"
            while IFS= read -r commit; do
              if [[ -n "$commit" ]]; then
                echo "- $commit"
              fi
            done <<< "$commits"

            echo ""
          } > "$temp_file"

          if [ -f CHANGELOG.md ]; then
            tail -n +2 CHANGELOG.md >> "$temp_file"
          fi

          mv "$temp_file" CHANGELOG.md

      - name: Commit changelog
        run: |
          git add CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.new_tag }}" || echo "No changelog changes"

      - name: Create Git tag
        run: |
          git tag "${{ steps.version.outputs.new_tag }}"

      - name: Push changes and tag
        run: |
          git push origin main
          git push origin "${{ steps.version.outputs.new_tag }}"
