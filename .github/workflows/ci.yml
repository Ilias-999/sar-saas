name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 backend/app --count --exit-zero --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run tests with pytest
        run: |
          cd backend
          PYTHONPATH=. pytest tests/ -v --tb=short
  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Create .env file
        run: |
          cat > .env << EOF
          FRONTEND_CONTAINER_NAME=sar-frontend
          FRONTEND_PORT=3000
          BACKEND_CONTAINER_NAME=sar-backend
          BACKEND_PORT=8000
          BACKEND_HOST=0.0.0.0
          EOF

      - name: Build Docker images with docker compose
        run: |
          docker compose build

      - name: Stop Docker containers
        run: |
          docker compose down || true

      - name: Build successful
        run: |
          echo "Docker images built successfully!"

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy on VPS with SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_APP_PATH }}
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker image prune -f
